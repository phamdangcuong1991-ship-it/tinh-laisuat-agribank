<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Tính Lãi Suất - Agribank Gia Định</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<style>
body { background: linear-gradient(to right, #b71c1c, #e53935); }
.card { border-radius: 15px; }
.header-title { color: #b71c1c; font-weight: bold; }
.btn-custom { background-color: #b71c1c; color: white; font-weight: bold; }
.btn-custom:hover { background-color: #8e0000; }
</style>
</head>

<body>

<div class="container mt-5 mb-5">
<div class="card shadow-lg p-4">

<div class="text-center mb-4">
<h4 class="header-title">AGRIBANK - CHI NHÁNH GIA ĐỊNH</h4>
<p class="text-muted mb-1" style="font-size:14px;">
Địa chỉ: Số 110 Phạm Ngũ Lão, Phường Hạnh Thông, Thành phố Hồ Chí Minh
</p>
<p class="fw-semibold mt-2">BẢNG TÍNH LÃI SUẤT TIỀN VAY</p>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>Họ và tên khách hàng</label>
<input type="text" id="customerName" class="form-control">
</div>
<div class="col-md-6 mb-3">
<label>Địa chỉ khách hàng</label>
<input type="text" id="customerAddress" class="form-control">
</div>
</div>

<div class="row">
<div class="col-md-4 mb-3">
<label>Số tiền vay (VNĐ)</label>
<input type="number" id="principal" class="form-control">
</div>
<div class="col-md-3 mb-3">
<label>Lãi suất (%/năm)</label>
<input type="number" id="rate" class="form-control">
</div>
<div class="col-md-3 mb-3">
<label>Thời gian (tháng)</label>
<input type="number" id="months" class="form-control">
</div>
<div class="col-md-2 mb-3">
<label>Phương thức</label>
<select id="method" class="form-select">
<option value="annuity">Trả góp đều</option>
<option value="reducing">Dư nợ giảm dần</option>
</select>
</div>
</div>

<button onclick="calculateLoan()" class="btn btn-custom w-100">TÍNH TOÁN</button>
<button onclick="exportExcel()" class="btn btn-success w-100 mt-2">XUẤT FILE EXCEL</button>

<hr>

<div id="summary" class="mb-3"></div>

<div class="table-responsive">
<table class="table table-bordered table-striped" id="scheduleTable" style="display:none;">
<thead class="table-danger text-center">
<tr>
<th>Tháng</th>
<th>Gốc (VNĐ)</th>
<th>Lãi (VNĐ)</th>
<th>Tổng trả (VNĐ)</th>
<th>Dư nợ còn lại (VNĐ)</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
function round(num){ return Math.round(num); }

function calculateLoan(){
let name=document.getElementById("customerName").value.trim();
let address=document.getElementById("customerAddress").value.trim();
let principal=parseFloat(document.getElementById("principal").value);
let rate=parseFloat(document.getElementById("rate").value);
let months=parseInt(document.getElementById("months").value);
let method=document.getElementById("method").value;

if(!name || !address || principal<=0 || rate<=0 || months<=0){
alert("Vui lòng nhập đầy đủ thông tin!");
return;
}

let monthlyRate=rate/100/12;
let balance=principal;
let totalInterest=0;
let tbody=document.querySelector("#scheduleTable tbody");
tbody.innerHTML="";

if(method==="annuity"){
let payment=round(principal*monthlyRate/(1-Math.pow(1+monthlyRate,-months)));
for(let i=1;i<=months;i++){
let interest=round(balance*monthlyRate);
let principalPaid=round(payment-interest);
balance=round(Math.max(0,balance-principalPaid));
totalInterest+=interest;

tbody.innerHTML+=`
<tr>
<td class="text-center">${i}</td>
<td>${principalPaid.toLocaleString("vi-VN")}</td>
<td>${interest.toLocaleString("vi-VN")}</td>
<td>${payment.toLocaleString("vi-VN")}</td>
<td>${balance.toLocaleString("vi-VN")}</td>
</tr>`;
}
}else{
let principalMonth=round(principal/months);
for(let i=1;i<=months;i++){
let interest=round(balance*monthlyRate);
let payment=round(principalMonth+interest);
balance=round(Math.max(0,balance-principalMonth));
totalInterest+=interest;

tbody.innerHTML+=`
<tr>
<td class="text-center">${i}</td>
<td>${principalMonth.toLocaleString("vi-VN")}</td>
<td>${interest.toLocaleString("vi-VN")}</td>
<td>${payment.toLocaleString("vi-VN")}</td>
<td>${balance.toLocaleString("vi-VN")}</td>
</tr>`;
}
}

document.getElementById("scheduleTable").style.display="table";
let totalPayment=round(principal+totalInterest);

document.getElementById("summary").innerHTML=`
<div class="alert alert-success">
<strong>Khách hàng:</strong> ${name}<br>
<strong>Địa chỉ:</strong> ${address}<hr>
<strong>Tổng tiền lãi:</strong> ${totalInterest.toLocaleString("vi-VN")} VNĐ<br>
<strong>Tổng tiền phải trả:</strong> ${totalPayment.toLocaleString("vi-VN")} VNĐ
</div>`;
}

async function exportExcel(){

let table=document.getElementById("scheduleTable");
if(table.style.display==="none"){
alert("Vui lòng tính toán trước!");
return;
}

let principal=parseFloat(document.getElementById("principal").value);

let workbook=new ExcelJS.Workbook();
let worksheet=workbook.addWorksheet("BangTinhLaiSuat");

worksheet.mergeCells('A1:E1');
worksheet.getCell('A1').value="AGRIBANK - CHI NHÁNH GIA ĐỊNH";
worksheet.getCell('A1').alignment={horizontal:'center'};
worksheet.getCell('A1').font={bold:true,size:16};

worksheet.mergeCells('A2:E2');
worksheet.getCell('A2').value="Địa chỉ: Số 110 Phạm Ngũ Lão, Phường Hạnh Thông, Thành phố Hồ Chí Minh";
worksheet.getCell('A2').alignment={horizontal:'center'};
worksheet.getCell('A2').font={italic:true,size:11};

worksheet.mergeCells('A3:E3');
worksheet.getCell('A3').value="BẢNG TÍNH LÃI SUẤT TIỀN VAY";
worksheet.getCell('A3').alignment={horizontal:'center'};
worksheet.getCell('A3').font={bold:true,size:14};

worksheet.mergeCells('A4:E4');
worksheet.getCell('A4').value="Số tiền vay: " + principal.toLocaleString("vi-VN") + " VNĐ";
worksheet.getCell('A4').alignment={horizontal:'center'};
worksheet.getCell('A4').font={italic:true};

worksheet.columns=[
{width:10},{width:18},{width:18},{width:18},{width:20}
];

worksheet.addRow([]);
worksheet.addRow(["Tháng","Gốc (VNĐ)","Lãi (VNĐ)","Tổng trả (VNĐ)","Dư nợ còn lại (VNĐ)"]);

let headerRow=worksheet.getRow(6);
headerRow.font={bold:true};
headerRow.alignment={horizontal:'center'};
headerRow.eachCell(cell=>{
cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
});

let rows=table.querySelectorAll("tbody tr");
rows.forEach(row=>{
let rowData=[];
row.querySelectorAll("td").forEach((cell,index)=>{
if(index===0){
rowData.push(parseInt(cell.innerText));
}else{
rowData.push(parseInt(cell.innerText.replace(/\./g,'')));
}
});
let newRow=worksheet.addRow(rowData);
newRow.eachCell((cell,col)=>{
cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
if(col>1){
cell.numFmt='#,##0';
cell.alignment={horizontal:'right'};
}else{
cell.alignment={horizontal:'center'};
}
});
});

const buffer=await workbook.xlsx.writeBuffer();
let blob=new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="BangTinhLaiSuat_Agribank.xlsx";
link.click();
}
</script>

</body>
</html>
